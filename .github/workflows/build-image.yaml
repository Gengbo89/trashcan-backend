name: Build and Push Image

on:
  push:
    tags:
      - "v*"

env:
  IMAGE: crpi-p67sy5t6k9nsmste.cn-hangzhou.personal.cr.aliyuncs.com/gengbo/trashcan

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: crpi-p67sy5t6k9nsmste.cn-hangzhou.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Build image
        run: |
          docker build \
            -t $IMAGE:${GITHUB_REF_NAME} \
            -t $IMAGE:latest .

      - name: Push image
        run: |
          docker push $IMAGE:${GITHUB_REF_NAME}
          docker push $IMAGE:latest
